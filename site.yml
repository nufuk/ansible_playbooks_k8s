---
- name: Update Kernel control-plane
  hosts: control-plane
  become: true
  gather_facts: true
  roles:
    - k8s-pre-run

- name: Update Kernel workers
  hosts: workers
  become: true
  gather_facts: true
  roles:
    - k8s-pre-run

- name: Install Kubernetes Cluster
  hosts: all
  become: true
  gather_facts: true
  roles:
    - k8s-common

- name: Configure Kubernetes Control Plane
  hosts: control-plane
  become: true
  gather_facts: true
  roles:
    - k8s-control-plane

- name: Configure Kubernetes Workers
  hosts: workers
  become: true
  gather_facts: true
  roles:
    - k8s-worker

- name: Run post setup tasks
  hosts: all
  become: true
  gather_facts: true
  roles:
    - k8s-post-setup