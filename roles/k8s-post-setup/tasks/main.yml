---
    - name: Assign eth0 interface to trusted zone
      ansible.posix.firewalld:
        zone: trusted
        interface: eth0
        permanent: true
        state: enabled
        
    - name: Assign cni0 interface to trusted zone
      ansible.posix.firewalld:
        zone: trusted
        interface: cni0
        permanent: true
        state: enabled

    - name: Assign flannel.1 interface to trusted zone
      ansible.posix.firewalld:
        zone: trusted
        interface: flannel.1
        permanent: true
        state: enabled

    - name: Restart firewalld service completely
      ansible.builtin.service:
        name: firewalld
        state: restarted

    - name: Pause for 1 minutes before offloading
      ansible.builtin.pause:
        minutes: 1

    - name: Disable RX and TX offloading on eth0
      ansible.builtin.command: ethtool -K eth0 tx off rx off
      become: true

    - name: Disable RX and TX offloading on cni0
      ansible.builtin.command: ethtool -K cni0 tx off rx off
      become: true

    - name: Disable RX and TX offloading on flannel.1
      ansible.builtin.command: ethtool -K flannel.1 tx off rx off
      become: true

    - name: Reboot the machine
      ansible.builtin.reboot:
        msg: "Reboot initiated by Ansible"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 0